name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend (check + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hecate-app-marthaw
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: hecate-app-marthaw/package-lock.json

      - run: npm ci
      - run: npx svelte-kit sync && npx svelte-check --tsconfig ./tsconfig.json
      - run: npm run build:lib

  daemon:
    name: Daemon (compile + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hecate-app-marthad
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          otp-version: "27"
          rebar3-version: "3.24"

      - name: Cache rebar3 deps
        uses: actions/cache@v4
        with:
          path: |
            hecate-app-marthad/_build/default/lib
            hecate-app-marthad/_build/default/plugins
          key: rebar3-${{ runner.os }}-${{ hashFiles('hecate-app-marthad/rebar.config') }}
          restore-keys: rebar3-${{ runner.os }}-

      - run: rebar3 compile
      - run: rebar3 eunit
      - run: rebar3 dialyzer
