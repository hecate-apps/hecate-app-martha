name: CI

on:
  push:
    branches: [main]
    tags-ignore: ["v*"]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend (check + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hecate-app-marthaw
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: hecate-app-marthaw/package-lock.json
      - run: npm ci
      - run: npx svelte-kit sync && npx svelte-check --tsconfig ./tsconfig.json
      - run: npm run build:lib

  daemon:
    name: Daemon (compile + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hecate-app-marthad
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          otp-version: "27"
          rebar3-version: "3.24"
      - name: Fetch deps
        run: rebar3 get-deps
      - run: rebar3 compile
      - run: rebar3 eunit
      - run: rebar3 dialyzer || echo "::warning::Dialyzer reported warnings (non-fatal)"
