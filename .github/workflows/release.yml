name: Release
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  frontend:
    name: Frontend (check + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hecate-app-marthaw
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: hecate-app-marthaw/package-lock.json
      - run: npm ci
      - run: npx svelte-kit sync && npx svelte-check --tsconfig ./tsconfig.json
      - run: npm run build:lib
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: hecate-app-marthaw/dist/
          retention-days: 1

  daemon:
    name: Daemon (compile + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hecate-app-marthad
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          otp-version: "27"
          rebar3-version: "3.24"
      - name: Fetch deps
        run: rebar3 get-deps
      - run: rebar3 compile
      - run: rebar3 eunit
      - run: rebar3 dialyzer || echo "::warning::Dialyzer reported warnings (non-fatal)"

  package:
    name: Build + publish release
    needs: [frontend, daemon]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          otp-version: "27"
          rebar3-version: "3.24"
      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: hecate-app-marthad/priv/static/
      - name: Build plugin tarball
        run: bash hecate-app-marthad/scripts/package.sh
      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Extract changelog entry
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BODY=$(sed -n "/^## \[${VERSION}\]/,/^## \[/p" CHANGELOG.md | sed '$d')
          echo "body<<EOF" >> "$GITHUB_OUTPUT"
          echo "${BODY}" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
      - uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.body }}
          generate_release_notes: false
          files: hecate-app-marthad/_build/plugin/hecate-app-martha.tar.gz

  cleanup:
    name: Clean up old releases
    needs: [package]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Delete old releases (keep latest 3)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release list --limit 100 --json tagName -q '.[].tagName' \
            | tail -n +4 \
            | while read -r tag; do
                echo "Deleting release $tag"
                gh release delete "$tag" --yes --cleanup-tag
              done
